name = "llm-circuits"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"
remote = true

# Optional: route Workers AI calls through AI Gateway for caching + cost telemetry.
# Free tier: 100k logs/day. Create a gateway in the Cloudflare dashboard, then set
# the env var below (or uncomment the [vars] block).
# [vars]
# AI_GATEWAY_ID = "llm-circuits"

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true
