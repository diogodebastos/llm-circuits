name = "llm-circuits"
main = "./dist/_worker.js/index.js"
compatibility_date = "2025-01-15"
compatibility_flags = ["nodejs_compat"]

[ai]
binding = "AI"
remote = true

# Optional: route Workers AI calls through AI Gateway for caching + cost telemetry.
# Free tier: 100k logs/day. Create a gateway in the Cloudflare dashboard, then set
# the env var below (or uncomment the [vars] block).
# [vars]
# AI_GATEWAY_ID = "llm-circuits"

# Optional: globally-shared capacitors via Durable Objects.
# Requires Workers Paid ($5/mo). Free tier leaves these commented and the
# /api/cap/* route returns 501 cleanly. The DO class lives at worker/Capacitor.ts.
# [[durable_objects.bindings]]
# name       = "CAPS"
# class_name = "Capacitor"
#
# [[migrations]]
# tag                = "v1"
# new_sqlite_classes = ["Capacitor"]

[assets]
directory = "./dist"
binding = "ASSETS"

[observability]
enabled = true
